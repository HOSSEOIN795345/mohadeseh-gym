name: Build Mohadeseh Gym APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Install dependencies
      run: |
        sudo apt update

        sudo apt install -y \
        python3-pip \
        python3-venv \
        git \
        unzip \
        wget \
        openjdk-17-jdk \
        autoconf \
        automake \
        libtool \
        pkg-config


    - name: Setup Java 17
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH


    - name: Install Buildozer
      run: |
        python3 -m pip install --user --upgrade pip
        python3 -m pip install --user buildozer cython==0.29.36


    - name: Setup Android SDK
      run: |

        mkdir -p $HOME/.buildozer/android/platform

        cd $HOME/.buildozer/android/platform

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

        unzip -q commandlinetools-linux-11076708_latest.zip

        mkdir -p android-sdk/cmdline-tools

        mv cmdline-tools android-sdk/cmdline-tools/latest


        echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV

        echo "$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

        echo "$HOME/.buildozer/android/platform/android-sdk/platform-tools" >> $GITHUB_PATH


    - name: Install Android packages
      run: |

        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk

        yes | sdkmanager --licenses

        sdkmanager \
        "platform-tools" \
        "platforms;android-35" \
        "build-tools;35.0.0"



    - name: Clean old build
      run: |

        rm -rf .buildozer


    - name: Build APK
      run: |

        export PATH=$PATH:$HOME/.local/bin

        buildozer android debug


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:

        name: mohadeseh-gym-apk

        path: bin/*.apk
